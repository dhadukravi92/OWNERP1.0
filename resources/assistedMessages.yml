chooseInstallationOptions:
  en: Choose OwnERP Installation Mode
whoShouldThisApplicationBeInstalledFor:
  en: Select how this ERP workspace should be available on this computer.
selectUserMode:
  en: Choose Master System for a shared business workstation, or User System for a private single-user setup.
forAll:
  en: Master System - shared for all Windows users
onlyForMe:
  en: User System - only for me
freshInstallForAll:
  en: Installs OwnERP as a shared workstation app. Recommended for office PCs used by multiple staff members.
freshInstallForCurrent:
  en: Installs OwnERP only for the current Windows account. Recommended for laptops and personal workstations.
perMachineInstallExists:
  en: A shared Master System installation already exists. Setup will reinstall or upgrade it.
perMachineInstall:
  en: Shared Master System installation
perUserInstallExists:
  en: A User System installation already exists. Setup will reinstall or upgrade it.
perUserInstall:
  en: User System installation
